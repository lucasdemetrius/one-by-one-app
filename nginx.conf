# ═══════════════════════════════════════════════════════
# nginx.conf — OneByOne App (produção em container)
# Serve os arquivos estáticos do build do React e encaminha
# as chamadas /api para o container da API Go.
# ═══════════════════════════════════════════════════════

# Mapa para o cabeçalho Connection do upgrade WebSocket:
# se a requisição pede upgrade, repassa "upgrade"; senão, "close".
# (Fica no contexto http — este arquivo é incluído dentro do http block.)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Encaminha as chamadas de API para o serviço "api" da rede do Docker Compose.
    # O frontend chama "/api/v1/..."; o nginx repassa para http://api:8090/api/v1/...
    location /api/ {
        proxy_pass http://api:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Suporte a WebSocket (1:1 ao vivo em /api/v1/ws/...). Estes cabeçalhos
        # são inofensivos para as chamadas HTTP normais.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    # SPA: qualquer rota desconhecida devolve o index.html para o React Router
    # resolver no cliente (ex.: /entrar, /painel ao recarregar a página).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # O index.html NUNCA pode ser cacheado: ele aponta para os assets versionados
    # (com hash). Se o navegador cachear o index.html antigo, fica preso na versão
    # antiga mesmo após um novo deploy. no-store garante que sempre busque o atual.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # Cache longo para os assets versionados (têm hash no nome).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
