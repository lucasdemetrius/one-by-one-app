# ═══════════════════════════════════════════════════════
# nginx.conf — OneByOne App (produção em container)
# Serve os arquivos estáticos do build do React e encaminha
# as chamadas /api para o container da API Go.
# ═══════════════════════════════════════════════════════

# Mapa para o cabeçalho Connection do upgrade WebSocket:
# se a requisição pede upgrade, repassa "upgrade"; senão, "close".
# (Fica no contexto http — este arquivo é incluído dentro do http block.)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Não revelar a versão do nginx no cabeçalho "Server" (vira só "Server: nginx", sem a
    # versão) — evita entregar a versão da infraestrutura para mira de CVEs. Vale para TODAS
    # as respostas, inclusive as de /api. (Remover o "nginx" por completo exigiria o módulo
    # headers-more, que não vem no nginx padrão.)
    server_tokens off;

    # Cabeçalhos de segurança do conteúdo ESTÁTICO (a API já tem os seus). Ficam por-location
    # (não no server) de propósito: o `add_header` do nginx NÃO é herdado por um location que
    # tenha o seu próprio add_header, e colocá-los no server duplicaria os cabeçalhos nas
    # respostas de /api (que já vêm com os seus). Por isso repetimos nos locations estáticos.

    # Encaminha as chamadas de API para o serviço "api" da rede do Docker Compose.
    # O frontend chama "/api/v1/..."; o nginx repassa para http://api:8090/api/v1/...
    location /api/ {
        proxy_pass http://api:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Suporte a WebSocket (1:1 ao vivo em /api/v1/ws/...). Estes cabeçalhos
        # são inofensivos para as chamadas HTTP normais.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    # SPA: qualquer rota desconhecida devolve o index.html para o React Router
    # resolver no cliente (ex.: /entrar, /painel ao recarregar a página).
    location / {
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Content-Security-Policy: script-src SEM 'unsafe-inline' bloqueia XSS injetado
        # (inclusive href="javascript:") — o build do Vite só usa scripts externos. As
        # exceções liberam exatamente o necessário: Google Sign-In e reCAPTCHA
        # (accounts.google.com / www.google.com / www.gstatic.com) e as Google Fonts
        # (fonts.googleapis.com / fonts.gstatic.com). connect-src 'self' cobre a API e o
        # WebSocket na mesma origem. Se algum recurso legítimo for bloqueado, ajustar aqui.
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' https://accounts.google.com https://www.gstatic.com https://www.google.com; connect-src 'self' https://accounts.google.com; frame-src 'self' https://accounts.google.com https://www.google.com" always;
        try_files $uri $uri/ /index.html;
    }

    # O index.html NUNCA pode ser cacheado: ele aponta para os assets versionados
    # (com hash). Se o navegador cachear o index.html antigo, fica preso na versão
    # antiga mesmo após um novo deploy. no-store garante que sempre busque o atual.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' https://accounts.google.com https://www.gstatic.com https://www.google.com; connect-src 'self' https://accounts.google.com; frame-src 'self' https://accounts.google.com https://www.google.com" always;
        expires -1;
    }

    # Cache longo para os assets versionados (têm hash no nome).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }
}
